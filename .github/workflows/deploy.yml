name: CI/CD Backend - Despachos

on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build con Maven (sin tests)
        run: mvn clean package -DskipTests -B

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/back-despachos:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/back-despachos:${{ github.sha }}

      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_BACKEND_HOST }} "
              cd ~/app/backend
              echo DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} > .env
              echo DB_NAME=${{ secrets.DB_NAME }} >> .env
              echo DB_USERNAME=${{ secrets.DB_USERNAME }} >> .env
              echo DB_PASSWORD=${{ secrets.DB_PASSWORD }} >> .env
              echo MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} >> .env
              docker compose pull backend
              docker compose up -d --force-recreate backend
              docker image prune -f
            "
